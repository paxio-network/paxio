name: CI · Spec Review (Phase 0 fast gate)

# M-Q2 T-4 — Fast gate triggered by PR label `spec-ready`. Runs ONLY:
#   - pnpm install --frozen-lockfile (catches lockfile drift, M-Q2 T-3 backstop)
#   - pnpm typecheck (TS strict mode, no any, no missing imports)
#   - pnpm exec vitest run (ROOT — workspace baseline)
#   - 4 M-Q2 drift-guard tests (rule-file structural integrity)
#
# Total runtime target: <90s (no build, no cargo, no per-app filter loop).
# Designed for architect's spec PRs — code не написан, fast feedback critical.
#
# Background: Phase 0 spec-pass model (см. .claude/agents/reviewer.md::Phase 0).
# Architect adds label `spec-ready` to spec PR → this workflow runs.
# Reviewer Phase 0 sub-agent (architect-protocol § 6.5) walks coding-standards-
# checklist.md based on these CI outputs.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    branches: [dev, main]

concurrency:
  group: ci-spec-review-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '10.33.0'
  NODE_VERSION: '22'

jobs:
  spec-review:
    # Run only when label `spec-ready` is present on PR
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'spec-ready')
    name: Spec review fast gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install (frozen lockfile — catches lockfile drift)
        run: pnpm install --frozen-lockfile

      - name: Typecheck (root, all packages)
        run: pnpm typecheck

      - name: Root vitest baseline
        run: pnpm exec vitest run

      - name: M-Q2 drift-guard tests (spec-review meta files structural integrity)
        run: |
          # Each drift-guard test validates one M-Q2 deliverable's structure:
          #   - spec-review-checklist.test.ts → coding-standards-checklist.md (120 rules)
          #   - reviewer-phase-0.test.ts → reviewer.md Phase 0 section
          #   - architect-self-review.test.ts → architect-protocol.md § 6.5
          #   - rust-rules.test.ts → 3 NEW Rust rule files (rust-{error-handling,async,build}.md)
          #   - ts-gap-rules.test.ts → 13 TS gap-rules ported into existing files
          GUARDS=()
          for t in spec-review-checklist reviewer-phase-0 architect-self-review rust-rules ts-gap-rules; do
            if [ -f "tests/${t}.test.ts" ]; then
              GUARDS+=("tests/${t}.test.ts")
            fi
          done
          if [ "${#GUARDS[@]}" -eq 0 ]; then
            echo "::warning::No M-Q2 drift-guard tests found (M-Q2 not yet landed)"
          else
            echo "Running ${#GUARDS[@]} drift-guard test files: ${GUARDS[*]}"
            pnpm exec vitest run "${GUARDS[@]}"
          fi

  status-check:
    name: All Spec Review Checks Passed
    runs-on: ubuntu-latest
    needs: [spec-review]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       contains(github.event.pull_request.labels.*.name, 'spec-ready'))
    steps:
      - name: Verify spec-review job passed
        run: |
          if [ "${{ needs.spec-review.result }}" != "success" ]; then
            echo "❌ Spec review job failed: ${{ needs.spec-review.result }}"
            exit 1
          fi
          echo "✅ Spec review fast gate passed"
          echo "   Architect can self-call reviewer Phase 0 (sub-agent) на этот PR."
          echo "   Reviewer walks .claude/rules/coding-standards-checklist.md top-down."
          echo "   APPROVED → architect adds 'dev-ready' label → handoff to user."
