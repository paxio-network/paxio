name: Scheduled · Crawl Sources

# M-L1-T3h — every 6 hours, fire POST /api/admin/crawl per source via parallel jobs.
#
# Sources with REAL adapters in production (verified yielding agents):
#   - mcp           ~3260 agents (Smithery REST)
#   - fetch-ai      ~9200 agents (Agentverse REST)
#   - paxio-curated  ~3 agents (manual seed JSON)
#
# Stub sources (erc8004, a2a, virtuals) excluded from cron until real
# adapters land — they yield empty AsyncIterable and would only burn
# crawl_runs rows + Actions minutes per tick. Available via
# workflow_dispatch for manual probing.
#
# Future sources (T-7 eliza / T-10 huggingface / T-12 github-discovered etc)
# add a new entry to the matrix once their adapter merges.

on:
  schedule:
    - cron: '0 */6 * * *'  # 00:00, 06:00, 12:00, 18:00 UTC daily
  workflow_dispatch:
    inputs:
      source:
        description: 'Crawler source (must be in CRAWLER_SOURCES)'
        required: true
        default: 'mcp'
        type: choice
        options:
          - mcp
          - fetch-ai
          - paxio-curated
          - erc8004
          - a2a
          - virtuals

jobs:
  # Scheduled tick: parallel matrix across all 3 working sources.
  crawl-scheduled:
    if: github.event_name == 'schedule'
    name: Crawl ${{ matrix.source }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        source: [mcp, fetch-ai, paxio-curated]
    concurrency:
      group: scheduled-crawl-${{ matrix.source }}
      cancel-in-progress: true
    steps:
      - name: POST /api/admin/crawl?source=${{ matrix.source }}
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          SOURCE: ${{ matrix.source }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::ADMIN_TOKEN secret not configured"; exit 1
          fi
          echo "Crawling source=$SOURCE on api.paxio.network..."
          response=$(curl -sfS -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -w "\nHTTP_CODE=%{http_code}\nTIME=%{time_total}s\n" \
            --max-time 2700 \
            "https://api.paxio.network/api/admin/crawl?source=$SOURCE")
          echo "$response"
          http_code=$(echo "$response" | grep -oE 'HTTP_CODE=[0-9]+' | tail -1 | cut -d= -f2)
          if [ "$http_code" = "200" ]; then
            echo "✅ crawl completed for source=$SOURCE"
          elif [ "$http_code" = "429" ]; then
            echo "⚠️  rate-limited — previous run < 5min ago; OK"; exit 0
          else
            echo "::error::unexpected HTTP code $http_code"; exit 1
          fi

  # Manual dispatch: single source picked by user.
  crawl-manual:
    if: github.event_name == 'workflow_dispatch'
    name: Crawl ${{ github.event.inputs.source }} (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: manual-crawl-${{ github.event.inputs.source }}
      cancel-in-progress: true
    steps:
      - name: POST /api/admin/crawl?source=${{ github.event.inputs.source }}
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          SOURCE: ${{ github.event.inputs.source }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::ADMIN_TOKEN secret not configured"; exit 1
          fi
          echo "Crawling source=$SOURCE on api.paxio.network..."
          response=$(curl -sfS -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -w "\nHTTP_CODE=%{http_code}\nTIME=%{time_total}s\n" \
            --max-time 2700 \
            "https://api.paxio.network/api/admin/crawl?source=$SOURCE")
          echo "$response"
          http_code=$(echo "$response" | grep -oE 'HTTP_CODE=[0-9]+' | tail -1 | cut -d= -f2)
          if [ "$http_code" = "200" ]; then
            echo "✅ crawl completed for source=$SOURCE"
          elif [ "$http_code" = "429" ]; then
            echo "⚠️  rate-limited — previous run < 5min ago; OK"; exit 0
          else
            echo "::error::unexpected HTTP code $http_code"; exit 1
          fi
