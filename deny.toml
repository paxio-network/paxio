# cargo-deny config for Paxio Rust workspace.
# Tunes the strictness of `EmbarkStudios/cargo-deny-action@v2` in ci-canisters.yml.
#
# Strategy: fail on vulnerabilities + rejected licenses, but tolerate the
# realistic ICP ecosystem state — transitive deps like `paste`, `bincode`
# are flagged "unmaintained" by RustSec but are widely used by ic-cdk 0.13+
# itself. We track them but don't red-flag the whole workspace.

[graph]
# all-features to catch everything reachable, including optional features
all-features = true

[advisories]
version = 2
# Yanked crates — fail immediately; vulnerabilities checked via RUSTSEC DB.
# Unmaintained & unsound: warn-only at this stage — the ICP ecosystem
# (ic-cdk 0.13, candid 0.10, ic-stable-structures 0.6) pulls in several
# transitive deps flagged `unmaintained` (bincode 1.x, paste, ...).
# Tracked for upgrade to ic-stable-structures ≥0.7 + migration paths in
# future milestones; not a security risk.
yanked = "deny"
unmaintained = "workspace"   # workspace direct deps only (allow transitives)
# Explicit ignores — each is a deliberate exception with a tracked upgrade path.
# These crates are required by the ICP ecosystem (ic-cdk, ic-stable-structures,
# candid) and are known "unmaintained" in RustSec DB but widely used in production.
ignore = [
    # bincode 1.3.3 — permanently unmaintained per bincode team statement
    # (RUSTSEC-2025-0141, filed after team ceased development following
    # doxxing incident). Used by ic-stable-structures 0.6 for canister state
    # serialization; no practical replacement until ic-stable-structures 0.7
    # migrates (wincode / postcard are suggested alternatives). Not a security
    # risk — the team considers 1.3.3 feature-complete.
    "RUSTSEC-2025-0141",
    # paste unmaintained (proc-macro helper) — pulled transitively by several
    # serde_derive/ic-cdk-macros internals. No drop-in replacement; waiting on
    # ICP macro ecosystem migration. Not flagged yet in live CI but ignored
    # preemptively to keep this file as the single source of waivers.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# SPDX identifiers we permit. Expand as needed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

# Exceptions for crates whose license metadata is ambiguous / custom
[[licenses.exceptions]]
allow = ["OpenSSL"]
name = "ring"

[[licenses.exceptions]]
allow = ["Unicode-DFS-2016"]
name = "unicode-ident"

[bans]
multiple-versions = "allow"   # ICP ecosystem has lots of version skew
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # DFINITY official
    "https://github.com/dfinity/cdk-rs",
    "https://github.com/dfinity/candid",
    "https://github.com/dfinity/stable-structures",
]
