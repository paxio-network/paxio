name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  typescript:
    name: TypeScript typecheck + lint + tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test -- --run

  rust-canisters:
    name: Rust canisters build + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: canisters
      - run: cd canisters && cargo build --release --target wasm32-unknown-unknown
      - run: cd canisters && cargo test
      - run: cd canisters && cargo clippy -- -D warnings

  acceptance:
    name: Acceptance scripts
    runs-on: ubuntu-22.04
    needs: [typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: bash scripts/verify_foundation.sh
