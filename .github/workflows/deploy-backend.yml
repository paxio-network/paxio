name: Deploy · Backend (Hetzner)

on:
  # Deploy from `dev` for now (single staging+prod env on Hetzner). Switch to
  # `[main]` only after we add a real staging or remove dev as the prod source.
  # Mirrors PROJECT pattern (single-branch deploy) — the branch name is the
  # only difference.
  push:
    branches: [dev, main]
    paths:
      - 'apps/back/**'
      - 'products/*/app/**'
      - 'packages/**'
      - 'Dockerfile.production'
      - 'docker-compose.yml'
      - 'docker-compose.production.yml'
      - 'infra/paxio-prod/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/paxio-backend:latest
            ghcr.io/${{ github.repository_owner }}/paxio-backend:${{ github.sha }}
          # GHA cache requires the docker-container buildx driver
          # (set up by docker/setup-buildx-action above). Without that
          # step, type=gha returns "Cache export is not supported for
          # the docker driver" — matches /PROJECT pattern minus cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          # Ephemeral GITHUB_TOKEN with packages:read; valid only for this run.
          # Forwarded into the SSH session via `envs:` so we can `docker login`
          # ghcr.io on the host without storing a long-lived PAT there.
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /home/${{ secrets.HETZNER_USER }}/paxio-prod

            echo "=== Login to ghcr.io ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "=== Pull new image ==="
            docker pull ghcr.io/${{ github.repository_owner }}/paxio-backend:${{ github.sha }}

            echo "=== Tag as latest ==="
            docker tag \
              ghcr.io/${{ github.repository_owner }}/paxio-backend:${{ github.sha }} \
              ghcr.io/${{ github.repository_owner }}/paxio-backend:latest

            echo "=== Restart backend ==="
            docker compose up -d --no-deps backend

            echo "=== Wait for healthy (90s) ==="
            timeout 90 sh -c 'until docker inspect --format="{{.State.Health.Status}}" paxio-backend 2>/dev/null | grep -q healthy; do sleep 5; done' || {
              echo "=== UNHEALTHY — container logs ==="
              docker logs paxio-backend --tail=100
              exit 1
            }

            echo "=== Cleanup older images ==="
            docker image prune -f

            echo "=== Logout ghcr.io (don't leave creds on disk) ==="
            docker logout ghcr.io || true

            echo "=== Done: ${{ github.sha }} ==="

      - name: Smoke test
        run: |
          sleep 10
          # Use checked-in script so the same gates run locally + in CI.
          # PAXIO_API_URL override allows targeting staging if we add one.
          chmod +x scripts/verify_M-L8_smoke.sh
          PAXIO_API_URL=https://api.paxio.network bash scripts/verify_M-L8_smoke.sh
          echo "✅ Smoke test passed"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/${{ secrets.HETZNER_USER }}/paxio-prod
            echo "=== ROLLBACK ==="
            # No ghcr.io pull needed — rollback uses an image already on disk.
            PREV=$(docker images ghcr.io/${{ github.repository_owner }}/paxio-backend \
              --format "{{.Tag}}" | grep -v latest | sort | tail -2 | head -1)
            if [ -z "$PREV" ]; then
              echo "No previous image — nothing to roll back to."
              exit 0
            fi
            docker tag \
              ghcr.io/${{ github.repository_owner }}/paxio-backend:$PREV \
              ghcr.io/${{ github.repository_owner }}/paxio-backend:latest
            docker compose up -d --no-deps backend
            echo "=== Rolled back to: $PREV ==="
